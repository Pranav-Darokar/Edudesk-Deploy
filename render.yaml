services:
  # 1. Backend Service (Spring Boot)
  - type: web
    name: edudesk-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: edudesk-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: edudesk-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: edudesk-db
          property: password
      - key: APP_FRONTEND_URL
        fromService:
          name: edudesk-frontend
          type: static_site
          property: host
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

  # 2. Frontend Service (React - Static Site)
  - type: static_site
    name: edudesk-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    root: frontend
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: edudesk-backend
          type: web
          property: host
        suffix: /api # Appends /api to the backend URL

# 3. Database Service (PostgreSQL)
databases:
  - name: edudesk-db
    databaseName: studentsDB
    user: postgres
    plan: free
